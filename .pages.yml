media:
  input: public
  output: /

content:
  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    filename: '{fields.slug}.md'
    view:
      fields: [title, status, featured, publishedAt]
      primary: title
      default:
        sort: publishedAt
        order: desc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - name: status
        label: Status
        type: select
        required: true
        default: draft
        options:
          values: [published, draft]
      - name: slug
        label: Slug
        type: string
        required: true
        pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
      - { name: description, label: Description, type: text }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: coverImage, label: Cover image, type: image }
      - { name: featured, label: Featured, type: boolean, default: false }
      - { name: publishedAt, label: Published at, type: datetime, required: true }
      - { name: body, label: Body, type: rich-text }

  - name: sections
    label: Sections
    type: collection
    path: src/content/sections
    filename: '{fields.slug}.md'
    view:
      fields: [title, status, publishedAt]
      primary: title
      default:
        sort: publishedAt
        order: desc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - name: status
        label: Status
        type: select
        required: true
        default: published
        options:
          values: [published, draft]
      - { name: slug, label: Slug, type: string, required: true }
      - { name: description, label: Description, type: text }
      - { name: coverImage, label: Cover image, type: image }
      - { name: technologies, label: Technologies, type: string, list: true }
      - { name: github, label: GitHub URL, type: string }
      - { name: link, label: Live link, type: string }
      - { name: publishedAt, label: Published at, type: datetime, required: true }
      - { name: body, label: Body, type: rich-text }

  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    filename: '{fields.slug}.md'
    view:
      fields: [title, status, publishedAt]
      primary: title
    fields:
      - { name: title, label: Title, type: string, required: true }
      - name: status
        label: Status
        type: select
        required: true
        default: published
        options:
          values: [published, draft]
      - { name: slug, label: Slug, type: string, required: true }
      - { name: description, label: Description, type: text }
      - { name: coverImage, label: Cover image, type: image }
      - { name: publishedAt, label: Published at, type: datetime, required: true }
      - { name: body, label: Body, type: rich-text }
